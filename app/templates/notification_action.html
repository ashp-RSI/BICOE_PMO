<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Allocation Response</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 480px;
      width: 100%;
      text-align: center;
      padding: 3rem 2rem;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }
    .icon.success { color: #28a745; }
    .icon.error   { color: #dc3545; }
    h1 {
      font-size: 1.35rem;
      color: #212529;
      margin-bottom: .75rem;
    }
    .message {
      font-size: .95rem;
      color: #495057;
      line-height: 1.6;
    }
    .footer {
      margin-top: 2rem;
      font-size: .8rem;
      color: #adb5bd;
    }
  </style>
</head>
<body>
  <div class="card">
    {% if success %}
      <div class="icon success">&#10004;</div>
      <h1>Response Recorded</h1>
    {% else %}
      <div class="icon error">&#10008;</div>
      <h1>Unable to Process</h1>
    {% endif %}
    <p class="message">{{ message }}</p>
    <p class="footer">Internal Project Management Tool</p>
  </div>
</body>
</html>
